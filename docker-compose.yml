services:
  db:
    image: postgres:16-alpine
    container_name: jw-reminders-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jw_reminders}
      POSTGRES_USER: ${POSTGRES_USER:-jw_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jw_admin} -d ${POSTGRES_DB:-jw_reminders}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: jw-reminders-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jw_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jw_reminders}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: "4000"
      WHATSAPP_API_URL: http://whatsapp:3010
      TEST_MODE: ${TEST_MODE:-true}
      TEST_PHONE: ${TEST_PHONE:-5219611234567}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: jw-reminders-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://jw-reminders.duckdns.org
      NODE_ENV: production
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: jw-reminders-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jw_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jw_reminders}
      WHATSAPP_API_URL: http://whatsapp:3010
      CRON_SCHEDULE: "*/10 * * * *"
      TEST_MODE: ${TEST_MODE:-true}
      TEST_PHONE: ${TEST_PHONE:-5219611234567}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  whatsapp:
    build:
      context: .
      dockerfile: apps/whatsapp/Dockerfile
    container_name: jw-reminders-whatsapp
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jw_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jw_reminders}
      PORT: "3010"
      WHATSAPP_SESSION_PATH: /app/apps/whatsapp/.wwebjs_auth
      NODE_ENV: production
    volumes:
      - whatsapp_session:/app/apps/whatsapp/.wwebjs_auth
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  whatsapp_session:
